services:
  postgres:
    image: postgres:18.3
    restart: always
    env_file: ../.creds/postgres.env
    ports:
      - 5432:5432
  flare:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: always
    environment:
      - LOG_LEVEL=info
    ports:
      - "8191:8191"

  hjudge:
    build: .
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file: ../.creds/.env
  